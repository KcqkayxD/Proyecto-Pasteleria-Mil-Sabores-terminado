<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Home | Pastelería Mil Sabores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="icon" type="image/png" href="../src/iconourl.png" />
</head>
<body data-page="admin-home">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>Panel Admin</h2>
      <nav>
        <a href="admin-home.html">🏠 Dashboard</a>
        <a href="admin-productos.html">🍰 Productos</a>
        <a href="admin-usuarios.html">👥 Usuarios</a>
        <a href="admin-pedidos.html">📦 Pedidos</a>
        <a href="admin-vendedor.html">👨‍💼 Vendedor</a>
        <a href="admin-ventas-dia.html">💰 Ventas del día</a>
      </nav>
      <button id="btn-logout" class="btn btn-outline btn-block">Cerrar sesión</button>
    </aside>

    <main class="admin-main">
      <header class="admin-header">
        <h1>Dashboard</h1>
      </header>
      <section class="admin-cards">
        <article class="card"><h3>Total Productos</h3><p id="kpi-productos">0</p></article>
        <article class="card"><h3>Total Usuarios</h3><p id="kpi-usuarios">0</p></article>
        <article class="card"><h3>Stock Crítico</h3><p id="kpi-critico">0</p></article>
        <article class="card"><h3>Último pedido</h3><p id="kpi-ultimo-pedido">Sin pedidos</p></article>
      </section>
    </main>
  </div>

  <script src="../js/productos.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const ultimoPedidoEl = document.getElementById("kpi-ultimo-pedido");
      const numero = localStorage.getItem("ultimoPedidoNumero");
      if (ultimoPedidoEl && numero) {
        ultimoPedidoEl.textContent = `#${numero}`;
      }
    });
  </script>




  <a class="whatsapp-float" href="https://wa.me/56912345678" target="_blank" rel="noopener" aria-label="WhatsApp">💬</a>
</body>
</html>
