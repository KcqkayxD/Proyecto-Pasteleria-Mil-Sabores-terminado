<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Pastelería Mil Sabores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="login">
  <main class="main-content auth-page">
    <section class="form-section">
      <div class="card form-card login-card">
        <div class="login-logo-wrap">
          <a href="index.html" class="logo logo-big">Mil Sabores</a>
        </div>
        <h1>Iniciar Sesión</h1>
        <form id="form-login" novalidate>
          <div class="field">
            <label for="loginCorreo">Correo</label>
            <input type="email" id="loginCorreo" name="loginCorreo" maxlength="100" />
            <small class="hint">Dominios permitidos: @inacap.cl, @inacapmail.cl, @gmail.com</small>
            <small class="error-message"></small>
          </div>
          <div class="field">
            <label for="loginPassword">Contraseña</label>
            <input type="password" id="loginPassword" name="loginPassword" minlength="4" maxlength="10" />
            <small class="error-message"></small>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
          <p class="text-center">¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
          <p class="text-center"><a href="admin/admin-login.html">Acceso administrativo</a></p>
        </form>
      </div>
    </section>
  </main>

  <script src="js/validaciones.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
